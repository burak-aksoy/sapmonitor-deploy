name: Update Docker Hub Description

on:
  push:
    branches:
      - main
    paths:
      - README.md

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets are set
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret is not set"
            exit 1
          fi
          echo "Secrets are set. Username length: ${#DOCKERHUB_USERNAME}"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: aksoybrk/sapmonitor
          readme-filepath: ./README.md
          short-description: "SAP S/4HANA monitoring & alerting — LLM-powered, MS Teams + email, Docker-ready"
